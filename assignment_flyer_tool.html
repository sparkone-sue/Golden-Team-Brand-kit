<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment Flyer Generator — Golden Team Realty</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Open Sans', Arial, Helvetica, sans-serif;
  background: #f4f5f7;
  color: #1f2440;
}
.layout {
  display: flex;
  min-height: 100vh;
  max-width: 1500px;
  margin: 0 auto;
  gap: 16px;
  padding: 16px;
}
.form-panel {
  flex: 0 0 380px;
  background: #fff;
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  overflow-y: auto;
  max-height: calc(100vh - 32px);
  position: sticky;
  top: 16px;
}
.preview-panel {
  flex: 1;
  background: #fff;
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-width: 0;
}
h1 { font-size: 18px; font-weight: 700; margin: 0 0 4px; color: #1f2440; }
h2 {
  font-size: 13px; font-weight: 700; margin: 18px 0 8px; color: #5a6280;
  text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid #e6e8f0; padding-bottom: 6px;
}
.subtitle { font-size: 12px; color: #6b7390; margin: 0 0 14px; }
.hint { font-size: 11px; color: #6b7390; margin: 0 0 8px; font-style: italic; }
.field { margin-bottom: 10px; }
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; }
label {
  display: block; font-size: 11px; font-weight: 700; color: #5a6280;
  margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.03em;
}
input[type=text], input[type=number], textarea {
  width: 100%; padding: 7px 9px; font: inherit; font-size: 13px;
  border: 1px solid #d4d8e3; border-radius: 5px; background: #fff;
  color: #1f2440; transition: border-color 0.15s;
}
input:focus, textarea:focus { outline: none; border-color: #2b5db3; }
textarea {
  resize: vertical; min-height: 100px; line-height: 1.4;
  font-family: 'Open Sans', Arial, sans-serif;
}
.char-counter { font-size: 10px; color: #999; text-align: right; margin-top: 2px; }

.photo-block {
  margin-bottom: 12px; padding: 10px; background: #f8f9fc;
  border-radius: 6px; border: 1px solid #e6e8f0;
}
.photo-block-title {
  font-size: 11px; font-weight: 700; color: #5a6280;
  text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 6px;
}
input[type=file] { font-size: 11px; width: 100%; }

.download-section { margin-top: 20px; padding-top: 12px; border-top: 1px solid #e6e8f0; }
.btn-download {
  width: 100%; padding: 10px; margin-bottom: 8px;
  background: linear-gradient(135deg, #e4a92a 0%, #ffd962 100%);
  color: #1a2547; border: none; border-radius: 6px;
  font-weight: 700; font-size: 13px; cursor: pointer;
  transition: transform 0.1s;
}
.btn-download:hover { transform: translateY(-1px); }
.btn-download.png {
  background: linear-gradient(135deg, #212b5e 0%, #2b5db3 100%);
  color: #fff;
}

#preview-svg {
  max-width: 100%; max-height: calc(100vh - 64px);
  height: auto; width: auto;
}
.preview-wrap { width: 100%; display: flex; justify-content: center; }
</style>
</head>
<body>
<div class="layout">
  <div class="form-panel">
    <h1>Assignment Flyer Generator</h1>
    <p class="subtitle">Golden Team Realty • Fill in the property info</p>

    <h2>Intersection</h2>
    <div class="field">
      <label for="f-cross">Intersection</label>
      <input type="text" id="f-cross" placeholder="QUEEN ST EAST & JAVIS ST" maxlength="60">
    </div>

    <h2>Asking Price</h2>
    <div class="field">
      <label for="f-price">Price</label>
      <input type="text" id="f-price" placeholder="e.g. 400,000" maxlength="12">
    </div>

    <h2>Property Details</h2>
    <div class="field-row">
      <div class="field">
        <label for="f-beds">Bedrooms</label>
        <input type="text" id="f-beds" placeholder="2+1" maxlength="6">
      </div>
      <div class="field">
        <label for="f-baths">Bathrooms</label>
        <input type="text" id="f-baths" placeholder="2" maxlength="6">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-parking">Parking</label>
        <input type="text" id="f-parking" placeholder="1" maxlength="6">
      </div>
      <div class="field">
        <label for="f-locker">Locker</label>
        <input type="text" id="f-locker" placeholder="1" maxlength="6">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-direction">Exposure</label>
        <input type="text" id="f-direction" placeholder="SOUTH east" maxlength="15">
      </div>
      <div class="field">
        <label for="f-area">Size (sq ft)</label>
        <input type="text" id="f-area" placeholder="767+100" maxlength="15">
      </div>
    </div>

    <h2>Description</h2>
    <div class="field">
      <textarea id="f-desc" maxlength="800" placeholder="Absolutely Gorgeous Quality Home at Prestigious Briar Hill-Belgravia Community..."></textarea>
      <div class="char-counter"><span id="desc-count">0</span> / 800</div>
    </div>

    <h2>Property Photos</h2>
    <p class="hint">Upload your photos — they auto-fit to the frame.</p>

    <div class="photo-block">
      <div class="photo-block-title">Left Photo (Large)</div>
      <input type="file" id="photo-left" accept="image/*">
    </div>

    <div class="photo-block">
      <div class="photo-block-title">Top Right Photo (Small)</div>
      <input type="file" id="photo-topright" accept="image/*">
    </div>

    <div class="photo-block">
      <div class="photo-block-title">Bottom Right Photo (Large)</div>
      <input type="file" id="photo-botright" accept="image/*">
    </div>

    <div class="download-section">
      <button class="btn-download" id="btn-pdf">⬇ Download PDF (Print)</button>
      <button class="btn-download png" id="btn-png">⬇ Download PNG (Digital)</button>
    </div>
  </div>

  <div class="preview-panel">
    <div class="preview-wrap">
      <svg id="preview-svg" viewBox="0 0 595.5 842.249979" xmlns="http://www.w3.org/2000/svg"
           xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="darkBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1a2547"/>
            <stop offset="100%" stop-color="#264f9b"/>
          </linearGradient>
          <!-- clipPaths for photos (from PDF rect data) -->
          <clipPath id="clip-left"><rect x="15.5" y="76.7" width="274.8" height="369.6"/></clipPath>
          <clipPath id="clip-topright"><rect x="374.4" y="76.7" width="156.8" height="88.8"/></clipPath>
          <clipPath id="clip-botright"><rect x="348.8" y="473.8" width="223.5" height="290.1"/></clipPath>

<script>
'use strict';

const $ = (id) => document.getElementById(id);

// Photo definitions - viewBox coordinates (from PDF rect data)
const PHOTOS = {
  left:     { x: 15.5,  y: 76.7,  w: 274.8, h: 369.6, dataUrl: null },
  topright: { x: 374.4, y: 76.7,  w: 156.8, h: 88.8,  dataUrl: null },
  botright: { x: 348.8, y: 473.8, w: 223.5, h: 290.1, dataUrl: null },
};
// Render order: photos render in this order (earlier = lower layer)
const PHOTO_ORDER = ['left', 'topright', 'botright'];

function renderPhotos() {
  const layer = $('photos-layer');
  layer.innerHTML = '';
  for (const key of PHOTO_ORDER) {
    const p = PHOTOS[key];
    if (!p.dataUrl) continue;
    const ns = 'http://www.w3.org/2000/svg';
    const g = document.createElementNS(ns, 'g');
    g.setAttribute('clip-path', 'url(#clip-' + key + ')');
    const img = document.createElementNS(ns, 'image');
    img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', p.dataUrl);
    img.setAttribute('href', p.dataUrl);
    img.setAttribute('x', p.x);
    img.setAttribute('y', p.y);
    img.setAttribute('width', p.w);
    img.setAttribute('height', p.h);
    img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
    g.appendChild(img);
    layer.appendChild(g);
  }
}

function bindPhotoUpload(key, inputId) {
  $(inputId).addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      PHOTOS[key].dataUrl = ev.target.result;
      renderPhotos();
    };
    reader.readAsDataURL(file);
  });
}
bindPhotoUpload('left',     'photo-left');
bindPhotoUpload('topright', 'photo-topright');
bindPhotoUpload('botright', 'photo-botright');

// Text field bindings
const F = {
  cross:     $('f-cross'),
  price:     $('f-price'),
  beds:      $('f-beds'),
  baths:     $('f-baths'),
  parking:   $('f-parking'),
  locker:    $('f-locker'),
  direction: $('f-direction'),
  area:      $('f-area'),
  desc:      $('f-desc'),
};

function updateText() {
  $('t-price').textContent     = F.price.value || '400,000';
  $('t-cross').textContent     = F.cross.value || 'QUEEN ST EAST & JAVIS ST';
  $('t-beds').textContent      = F.beds.value || '2+1';
  $('t-baths').textContent     = F.baths.value || '2';
  $('t-parking').textContent   = F.parking.value || '1';
  $('t-locker').textContent    = F.locker.value || '1';
  $('t-direction').textContent = F.direction.value || 'SOUTH east';
  $('t-area').textContent      = F.area.value || '767+100';
  renderDescription();
  $('desc-count').textContent = F.desc.value.length;
}

// Multi-line description wrapping (left-bottom region: x≈17.8 to ~333.6, baseline starts y=474)
function renderDescription() {
  const text = F.desc.value || 'Absolutely Gorgeous Quality Home at Prestigious Briar Hill-Belgravia Community. Newly Renovated, Steps To New Eglinton LRT. Exterior Newly Re-Done With Stucco And Newly Eaves. Newly Landscaped With A Concrete Patio. Modern Kitchen With Quartz Countertop and Centre Island. Pot Lights, 2 Bathrooms. Hardwood Throughout The Main Floor Open-Concept Plan With a Large Electric Fireplace. Vinyl Floor Throughout The Basement. Ideal For An In-Law Suite, With Separate Entrance. Close To Shopping, Park & Hwy and More.';
  const group = $('t-desc-group');
  group.innerHTML = '';
  const startX = 17.8;
  const startY = 474;
  const maxWidth = 333.6 - 17.8; // ≈315.8 units
  const lineHeight = 15;
  const fontSize = 12;

  const words = text.split(/\s+/);
  const lines = [];
  let curLine = '';
  const ns = 'http://www.w3.org/2000/svg';
  const measure = document.createElementNS(ns, 'text');
  measure.setAttribute('font-family', 'Arial, Helvetica, sans-serif');
  measure.setAttribute('font-size', fontSize);
  measure.setAttribute('visibility', 'hidden');
  $('preview-svg').appendChild(measure);

  for (const w of words) {
    const test = curLine ? (curLine + ' ' + w) : w;
    measure.textContent = test;
    const len = measure.getComputedTextLength();
    if (len > maxWidth && curLine) {
      lines.push(curLine);
      curLine = w;
    } else {
      curLine = test;
    }
  }
  if (curLine) lines.push(curLine);
  $('preview-svg').removeChild(measure);

  const maxLines = 12;
  const renderedLines = lines.slice(0, maxLines);

  for (let i = 0; i < renderedLines.length; i++) {
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', startX);
    t.setAttribute('y', startY + i * lineHeight);
    t.textContent = renderedLines[i];
    group.appendChild(t);
  }
}

for (const k in F) {
  F[k].addEventListener('input', updateText);
}

updateText();
renderPhotos();

// ===== Downloads =====
$('btn-pdf').addEventListener('click', () => {
  const svgEl = $('preview-svg');
  const ser = new XMLSerializer();
  const svgStr = ser.serializeToString(svgEl);
  const blob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const W = 1275, H = 1804;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const pngData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation: 'portrait', unit: 'pt', format: [595.5, 842.25]});
    pdf.addImage(pngData, 'PNG', 0, 0, 595.5, 842.25);
    pdf.save('Assignment_Flyer.pdf');
  };
  img.src = url;
});

$('btn-png').addEventListener('click', () => {
  const svgEl = $('preview-svg');
  const ser = new XMLSerializer();
  const svgStr = ser.serializeToString(svgEl);
  const blob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const W = 1700, H = 2406;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    canvas.toBlob((b) => {
      const dlUrl = URL.createObjectURL(b);
      const a = document.createElement('a');
      a.href = dlUrl;
      a.download = 'Assignment_Flyer.png';
      a.click();
      URL.revokeObjectURL(dlUrl);
    }, 'image/png');
  };
  img.src = url;
});
</script>
